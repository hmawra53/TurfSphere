<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1">
  <title>Reset Password – TurfSphere</title>
  <link rel="stylesheet" href="/css/style.css">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
</head>
<body>
<div class="auth-bg">
  <div class="auth-card">
    <div class="auth-logo">
      <div class="logo-icon"><i class="fas fa-key"></i></div>
      <h1>Reset Password</h1>
      <p>Enter your number and set a new password</p>
    </div>
    <div class="form-group">
      <label class="form-label">Mobile Number</label>
      <div class="input-icon"><i class="fas fa-phone"></i>
        <input type="tel" id="phone" class="form-input" placeholder="Registered mobile number" autofocus>
      </div>
    </div>
    <div class="form-group">
      <label class="form-label">New Password</label>
      <div class="input-icon" style="position:relative">
        <i class="fas fa-lock"></i>
        <input type="password" id="newPassword" class="form-input input-pw" placeholder="New password (min 6 chars)">
        <button class="pw-toggle" onclick="togglePw()"><i class="fas fa-eye" id="ei"></i></button>
      </div>
    </div>
    <button class="btn btn-green btn-full" id="resetBtn" onclick="doReset()">
      <i class="fas fa-save"></i> Update Password
    </button>
    <div class="auth-footer" style="margin-top:14px;">
      <a href="login.html"><i class="fas fa-arrow-left"></i> Back to Login</a>
    </div>
  </div>
</div>
<script src="/js/app.js"></script>
<script>
  function togglePw(){const p=document.getElementById('newPassword'),i=document.getElementById('ei');p.type=p.type==='password'?'text':'password';i.className=p.type==='password'?'fas fa-eye':'fas fa-eye-slash';}
  async function doReset(){
    const phone=document.getElementById('phone').value.trim();
    const newPassword=document.getElementById('newPassword').value;
    if(!phone||!newPassword){toast('Fill all fields','error');return;}
    if(newPassword.length<6){toast('Password must be 6+ characters','error');return;}
    const btn=document.getElementById('resetBtn');setLoading(btn,true);
    try{await api.post('/api/auth/reset-password',{phone,newPassword});toast('Password updated! Please login.');setTimeout(()=>window.location.href='login.html',900);}
    catch(e){toast(e.message,'error');setLoading(btn,false);}
  }
  document.addEventListener('keydown',e=>{if(e.key==='Enter')doReset();});
</script>
</body>
</html>
