<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1">
  <title>Compare Turfs – TurfSphere</title>
  <link rel="stylesheet" href="/css/style.css">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
  <style>
    .cmp-table{width:100%;border-collapse:collapse;background:var(--card);border-radius:14px;overflow:hidden;border:1px solid var(--border);}
    .cmp-table th,.cmp-table td{padding:14px 18px;border-bottom:1px solid var(--border);vertical-align:top;}
    .cmp-table th{background:var(--navy-2);font-size:13px;font-weight:600;color:var(--muted);text-align:left;white-space:nowrap;}
    .cmp-table td{font-size:13.5px;color:var(--text);}
    .cmp-table tr:last-child td,.cmp-table tr:last-child th{border-bottom:none;}
    .cmp-img{width:100%;height:140px;object-fit:cover;border-radius:10px;margin-bottom:10px;}
    .cmp-name{font-weight:700;font-size:1.05rem;margin-bottom:4px;}
    .best-badge{background:rgba(34,197,94,.15);color:var(--green);border:1px solid rgba(34,197,94,.3);border-radius:50px;font-size:11px;font-weight:700;padding:2px 9px;display:inline-block;margin-left:6px;}
    .cmp-stars{color:#facc15;font-size:15px;}
    .amenity-tag{display:inline-block;background:var(--navy);border:1px solid var(--border);border-radius:50px;padding:2px 9px;font-size:11.5px;color:var(--muted);margin:2px;}
    @media(max-width:640px){.cmp-table{display:block;overflow-x:auto;}}
  </style>
</head>
<body>
<div class="container">
  <div class="page-hdr">
    <div><h2><i class="fas fa-balance-scale" style="color:var(--green);margin-right:8px;"></i>Compare Turfs</h2><p>Side-by-side comparison to pick the best</p></div>
    <button class="btn btn-ghost" onclick="window.location.href='home.html'"><i class="fas fa-arrow-left"></i> Back</button>
  </div>
  <div id="cmpContent"><div style="display:flex;justify-content:center;padding:60px;"><div class="spinner"></div></div></div>
</div>
<script src="/js/app.js"></script>
<script>
  guard();
  buildNav();
  const ids=JSON.parse(localStorage.getItem('ts_compare')||'[]');
  if(!ids.length){document.getElementById('cmpContent').innerHTML='<div class="empty"><i class="fas fa-balance-scale"></i><h3>No turfs selected</h3><p>Go back and select up to 3 turfs to compare</p><a href="home.html" class="btn btn-green" style="margin-top:16px;">Browse Turfs</a></div>';}
  else{load();}

  async function load(){
    try{
      const turfs=await Promise.all(ids.map(id=>api.get('/api/turfs/'+id)));
      render(turfs);
    }catch(e){document.getElementById('cmpContent').innerHTML='<p style="color:var(--danger);text-align:center;padding:40px;">Failed to load turfs</p>';}
  }

  function render(turfs){
    const best=(key,fn)=>{const vals=turfs.map(t=>fn(t));const best=Math.max(...vals);return vals.map(v=>v===best);};
    const lowestPrice=Math.min(...turfs.map(t=>t.price));
    const highestRating=Math.max(...turfs.map(t=>t.rating||0));

    let html=`<div style="overflow-x:auto;"><table class="cmp-table"><thead><tr><th style="width:160px;">Feature</th>`;
    turfs.forEach(t=>{html+=`<th><img class="cmp-img" src="${parseFirstImage(t.image)}" onerror="this.src='${FALLBACK_IMG}'"><div class="cmp-name">${t.name}${t.price===lowestPrice?'<span class="best-badge">Best Value</span>':''}</div><div style="font-size:12px;color:var(--muted);"><i class="fas fa-map-marker-alt"></i> ${t.location}</div></th>`;})
    html+=`</tr></thead><tbody>`;

    // Sport
    html+=`<tr><th><i class="fas fa-futbol" style="color:var(--green);margin-right:6px;"></i>Sport</th>`;
    turfs.forEach(t=>{html+=`<td><i class="fas ${sportIcon(t.sport)}" style="color:var(--green);margin-right:5px;"></i>${t.sport}</td>`;});
    html+=`</tr>`;

    // Price
    html+=`<tr><th><i class="fas fa-rupee-sign" style="color:var(--green);margin-right:6px;"></i>Price/hr</th>`;
    turfs.forEach(t=>{html+=`<td style="${t.price===lowestPrice?'color:var(--green);font-weight:700;':''}">₹${t.price}${t.price===lowestPrice?' <span style="font-size:11px;background:rgba(34,197,94,.1);color:var(--green);border-radius:4px;padding:1px 5px;">Cheapest</span>':''}</td>`;});
    html+=`</tr>`;

    // Rating
    html+=`<tr><th><i class="fas fa-star" style="color:#facc15;margin-right:6px;"></i>Rating</th>`;
    turfs.forEach(t=>{html+=`<td><span class="cmp-stars">${'★'.repeat(Math.round(t.rating||0))}${'☆'.repeat(5-Math.round(t.rating||0))}</span> <span style="font-weight:700;${(t.rating||0)===highestRating?'color:var(--green)':''}">${(t.rating||0).toFixed(1)}</span> <span style="font-size:12px;color:var(--muted);">(${t.rating_count||0} reviews)</span></td>`;});
    html+=`</tr>`;

    // Amenities
    html+=`<tr><th><i class="fas fa-check-circle" style="color:var(--green);margin-right:6px;"></i>Amenities</th>`;
    turfs.forEach(t=>{let ams=[];try{ams=JSON.parse(t.amenities||'[]');}catch(e){}html+=`<td>${ams.length?ams.map(a=>`<span class="amenity-tag"><i class="fas fa-check" style="color:var(--green);font-size:10px;margin-right:3px;"></i>${a}</span>`).join(''):'<span style="color:var(--muted);">—</span>'}</td>`;});
    html+=`</tr>`;

    // Description
    html+=`<tr><th><i class="fas fa-info-circle" style="color:var(--green);margin-right:6px;"></i>About</th>`;
    turfs.forEach(t=>{html+=`<td style="font-size:13px;color:var(--muted);line-height:1.6;">${t.description||'No description.'}</td>`;});
    html+=`</tr>`;

    // Actions
    html+=`<tr><th>Action</th>`;
    turfs.forEach(t=>{html+=`<td><button class="btn btn-green btn-sm" onclick="book(${t.id},'${t.name.replace(/'/g,"\\'")}')"><i class="fas fa-calendar-check"></i> Book This</button></td>`;});
    html+=`</tr>`;

    html+=`</tbody></table></div>`;
    html+=`<div style="margin-top:20px;text-align:right;"><button class="btn btn-ghost btn-sm" onclick="clearAndBack()"><i class="fas fa-undo"></i> Clear & Pick Different Turfs</button></div>`;
    document.getElementById('cmpContent').innerHTML=html;
  }

  function book(id,name){localStorage.setItem('ts_turfId',id);localStorage.setItem('ts_turfName',name);window.location.href='booking.html';}
  function clearAndBack(){localStorage.removeItem('ts_compare');window.location.href='home.html';}
</script>
</body>
</html>
